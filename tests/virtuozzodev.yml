parameters:
  kapitan:
    dependencies:
      - type: https
        source: https://raw.githubusercontent.com/projectsyn/component-crossplane/v2.3.0/lib/crossplane.libsonnet
        output_path: vendor/lib/crossplane.libsonnet
      - type: https
        source: https://raw.githubusercontent.com/appuio/component-openshift4-operators/v1.4.0/lib/openshift4-operators.libsonnet
        output_path: vendor/lib/openshift4-operators.libsonnet

  facts:
    cloud: virtuozzo #important, do not change, to test cloudscale use dev.yaml instead
    sales_order: "10431"
    appcat_dev: true
    service_level: "zero"
    #service_level: "guaranteed_availability"

  global:
    appuio_metered_billing_zone_label_map:
      c-green-test-1234: "Kind - Local Test 0"

  crossplane:
    namespace: syn-crossplane

  appcat:
    grpcEndpoint: host.docker.internal:9443
    proxyFunction: false

    quotasEnabled: false
    appuioManaged: false
    billing:
      salesOrder: ST10120
      vshn:
        enableCronjobs: false
        meteringRules: false
      enableMockOrgInfo: true
      instanceUOM: uom_uom_45_1e112771
      network_policies:
        target_namespaces:
          vshn-appuio-mimir: false
      prometheus:
        url: http://prometheus-operated.prometheus-system:9090/prometheus
      cloudZone: ${global:appuio_metered_billing_zone_label_map:${cluster:name}}

    slos:
      enabled: false
      alertsEnabled: false
      sli_exporter:
        enableMaintenceObserver: false
      sla_reporter:
        enabled: true
        slo_mimir_svc: kube-prometheus-kube-prome-prometheus
        slo_mimir_namespace: prometheus-system
    controller:
      enabled: true
      postgres:
        enabled: false
    providers:
      exoscale:
        enabled: false
      cloudscale:
        enabled: false
      virtuozzo:
        enabled: true
        credentials:
          data:
            AWS_ACCESS_KEY_ID: "changeme"
            AWS_SECRET_ACCESS_KEY: "changeme"
            S3_ENDPOINT_URL: "changeme"
      kubernetes:
        enabled: true
      helm:
        enabled: true
      minio:
        enabled: false

    apiserver:
      enabled: true

    services:
      emailAlerting:
        enabled: false
      vshn:
        enabled: false
        mariadb:
          enabled: false
        keycloak:
          enabled: false
        nextcloud:
          enabled: false
        postgres:
          enabled: false
          sgNamespace: stackgres
        redis:
          enabled: false
        minio:
          enabled: false

      generic:
        objectstorage:
          enabled: true

          defaultComposition: virtuozzo
          compositions:
            exoscale:
              enabled: false
            cloudscale:
              enabled: false
            minio:
              enabled: false
            virtuozzo:
              enabled: true
