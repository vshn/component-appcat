apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/managed-by: commodore
    app.kubernetes.io/name: cnpg
  name: cnpg-alerts
  namespace: syn-appcat
spec:
  groups:
    - name: cnpg-ha-alerts
      rules:
        - alert: CNPGPostgreSQLReplicationLagCritical
          annotations:
            description: |-
              The replication lag to {{ $labels.pod }} in {{ $labels.namespace }} has been over 300 seconds for 5 minutes.
                Please investigate the replication status of this instance.
            runbook_url: https://kb.vshn.ch/app-catalog/service/postgresql/runbooks/CNPGPostgreSQLReplicationLagCritical.html
            summary: PostgreSQL replication lag critical
          expr: cnpg_pg_replication_lag > 300
          for: 5m
          labels:
            OnCall: 'false'
            service: cnpg-postgres
            severity: critical
            syn: 'true'
            syn_component: appcat
            syn_team: schedar
        - alert: CNPGPostgreSQLReplicaFailingReplication
          annotations:
            description: |-
              A replica in {{ $labels.namespace }} is in recovery but the WAL receiver is not running.
                Please investigate the replication status of this instance.
            runbook_url: https://kb.vshn.ch/app-catalog/service/postgresql/runbooks/system/CNPGPostgreSQLReplicaFailingReplication.html
            summary: PostgreSQL replica failing replication
          expr: cnpg_pg_replication_in_recovery == 1 and on(namespace, pod) cnpg_pg_replication_is_wal_receiver_up
            == 0
          for: 5m
          labels:
            OnCall: 'false'
            service: cnpg-postgres
            severity: critical
            syn: 'true'
            syn_component: appcat
            syn_team: schedar
        - alert: CNPGPostgreSQLManualSwitchoverRequired
          annotations:
            description: |-
              A manual switchover is required for the PostgreSQL cluster in {{ $labels.namespace }}.
                Please perform the switchover using the CNPG plugin.
            runbook_url: https://kb.vshn.ch/app-catalog/service/postgresql/runbooks/system/CNPGPostgreSQLManualSwitchoverRequired.html
            summary: PostgreSQL manual switchover required
          expr: max by(namespace)(cnpg_collector_manual_switchover_required) == 1
          for: 1m
          labels:
            OnCall: '{{ if eq $labels.sla "guaranteed" }}true{{ else }}false{{ end
              }}'
            service: cnpg-postgres
            severity: critical
            syn: 'true'
            syn_component: appcat
            syn_team: schedar
        - alert: CNPGPostgreSQLNoStreamingReplicas
          annotations:
            description: |-
              The HA cluster in {{ $labels.namespace }} has no streaming replicas connected to the primary for 5 minutes.
                HA is completely broken. If the primary fails now, there is no replica to promote.
            runbook_url: https://kb.vshn.ch/app-catalog/service/postgresql/runbooks/system/CNPGPostgreSQLNoStreamingReplicas.html
            summary: PostgreSQL has no streaming replicas
          expr: cnpg_pg_replication_streaming_replicas == 0 and on(namespace, pod)
            cnpg_pg_replication_in_recovery == 0 and on(namespace) sum by(namespace)(cnpg_pg_replication_in_recovery)
            > 0
          for: 5m
          labels:
            OnCall: 'false'
            service: cnpg-postgres
            severity: critical
            syn: 'true'
            syn_component: appcat
            syn_team: schedar
        - alert: CNPGPostgreSQLXIDWraparound
          annotations:
            description: |-
              Database {{ $labels.datname }} in {{ $labels.namespace }} has a transaction ID age of {{ $value }}.
                XID wraparound will cause PostgreSQL to shut down to prevent data corruption. Run VACUUM FREEZE immediately.
            runbook_url: https://kb.vshn.ch/app-catalog/service/postgresql/runbooks/system/CNPGPostgreSQLXIDWraparound.html
            summary: PostgreSQL transaction ID wraparound risk
          expr: cnpg_pg_database_xid_age > 300000000 and on(namespace, pod) cnpg_pg_replication_in_recovery
            == 0
          for: 1m
          labels:
            OnCall: '{{ if eq $labels.sla "guaranteed" }}true{{ else }}false{{ end
              }}'
            service: cnpg-postgres
            severity: critical
            syn: 'true'
            syn_component: appcat
            syn_team: schedar
        - alert: CNPGPostgreSQLFencingOn
          annotations:
            description: |-
              A PostgreSQL instance in {{ $labels.namespace }} has fencing enabled.
                The instance is isolated from traffic and requires manual intervention using the CNPG plugin to unfence.
            runbook_url: https://kb.vshn.ch/app-catalog/service/postgresql/runbooks/system/CNPGPostgreSQLFencingOn.html
            summary: PostgreSQL instance is fenced
          expr: cnpg_collector_fencing_on == 1
          for: 1m
          labels:
            OnCall: 'false'
            service: cnpg-postgres
            severity: critical
            syn: 'true'
            syn_component: appcat
            syn_team: schedar
        - alert: CNPGPostgreSQLArchiveFailing
          annotations:
            description: |-
              WAL archiving for the PostgreSQL cluster in {{ $labels.namespace }} has been failing.
                Point-in-time recovery and backups are at risk. Investigate the archive_status and object store connectivity.
            runbook_url: https://kb.vshn.ch/app-catalog/service/postgresql/runbooks/system/CNPGPostgreSQLArchiveFailing.html
            summary: PostgreSQL WAL archiving is failing
          expr: cnpg_pg_stat_archiver_last_failed_time > cnpg_pg_stat_archiver_last_archived_time
            and cnpg_pg_stat_archiver_last_archived_time > 0
          for: 5m
          labels:
            OnCall: 'false'
            service: cnpg-postgres
            severity: warning
            syn: 'true'
            syn_component: appcat
            syn_team: schedar
        - alert: CNPGClusterHAWarning
          annotations:
            description: The cluster in {{ $labels.namespace }} has fewer than 2 streaming
              replicas. HA is degraded.
            runbook_url: https://github.com/cloudnative-pg/charts/blob/main/charts/cluster/docs/runbooks/CNPGClusterHAWarning.md
            summary: CNPG Cluster High Availability warning
          expr: max by (namespace) (cnpg_pg_replication_streaming_replicas) < 2 and
            on(namespace) sum by (namespace) (cnpg_pg_replication_in_recovery) > 0
          for: 5m
          labels:
            OnCall: 'false'
            service: cnpg-postgres
            severity: warning
            syn: 'true'
            syn_component: appcat
            syn_team: schedar
        - alert: CNPGClusterOffline
          annotations:
            description: All CNPG collectors in {{ $labels.namespace }} are reporting
              down. The cluster may be offline.
            runbook_url: https://github.com/cloudnative-pg/charts/blob/main/charts/cluster/docs/runbooks/CNPGClusterOffline.md
            summary: CNPG Cluster is offline
          expr: count by(namespace)(cnpg_collector_up) == 0
          for: 5m
          labels:
            OnCall: '{{ if eq $labels.sla "guaranteed" }}true{{ else }}false{{ end
              }}'
            service: cnpg-postgres
            severity: critical
            syn: 'true'
            syn_component: appcat
            syn_team: schedar
        - alert: CNPGClusterInstancesOnSameNode
          annotations:
            description: Multiple CNPG instances in {{ $labels.namespace }} are running
              on the same node {{ $labels.node }}. This reduces HA effectiveness.
            runbook_url: https://github.com/cloudnative-pg/charts/blob/main/charts/cluster/docs/runbooks/CNPGClusterInstancesOnSameNode.md
            summary: CNPG Cluster instances on same node
          expr: count by (namespace, node) (kube_pod_info{namespace=~"vshn-postgresql-.*",
            pod=~"postgresql-.*"}) > 1
          for: 5m
          labels:
            OnCall: 'false'
            service: cnpg-postgres
            severity: warning
            syn: 'true'
            syn_component: appcat
            syn_team: schedar
