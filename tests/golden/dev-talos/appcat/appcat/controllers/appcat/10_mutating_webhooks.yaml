apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  annotations:
    cert-manager.io/inject-ca-from: syn-appcat/webhook-certificate
  name: appcat-sshgateway
webhooks:
  - admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: webhook-service
        namespace: syn-appcat
        path: /mutate-gateway-networking-x-k8s-io-v1alpha1-xlistenerset
    failurePolicy: Fail
    name: mxlistenerset.kb.io
    rules:
      - apiGroups:
          - gateway.networking.x-k8s.io
        apiVersions:
          - v1alpha1
        operations:
          - CREATE
        resources:
          - xlistenersets
    sideEffects: None
