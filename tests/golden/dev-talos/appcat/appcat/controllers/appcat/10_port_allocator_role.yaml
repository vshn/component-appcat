apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: '-100'
  labels:
    name: appcat-controller-port-allocator
  name: appcat-controller:port-allocator
rules:
  - apiGroups:
      - gateway.networking.x-k8s.io
    resources:
      - xlistenersets
    verbs:
      - list
      - get
  - apiGroups:
      - gateway.networking.k8s.io
    resources:
      - gateways
    verbs:
      - list
      - watch
