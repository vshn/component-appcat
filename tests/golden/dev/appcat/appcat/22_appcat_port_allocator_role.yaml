apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations:
    argocd.argoproj.io/sync-wave: '-100'
  labels:
    name: function-appcat-port-allocator
  name: function-appcat:port-allocator
rules:
  - apiGroups:
      - ''
    resources:
      - configmaps
    verbs:
      - get
      - create
      - update
  - apiGroups:
      - gateway.networking.x-k8s.io
    resources:
      - xlistenersets
    verbs:
      - get
