apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  annotations: {}
  labels:
    name: crossplane-aggregate-to-crossplane-cnpg-clusters
    rbac.crossplane.io/aggregate-to-crossplane: 'true'
  name: crossplane:aggregate-to-crossplane:cnpg-clusters
rules:
  - apiGroups:
      - postgresql.cnpg.io
    resources:
      - clusters
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - '*'
