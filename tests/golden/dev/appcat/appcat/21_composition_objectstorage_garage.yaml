apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: '-60'
    metadata.appcat.vshn.io/description: S3 compatible object storage hosted by Garage-garage
    metadata.appcat.vshn.io/displayname: Garage-garage Object Storage
    metadata.appcat.vshn.io/end-user-docs-url: https://vs.hn/objstor
    metadata.appcat.vshn.io/product-description: https://products.docs.vshn.ch/products/appcat/objectstorage.html
    metadata.appcat.vshn.io/zone: us-east-1
  labels:
    metadata.appcat.vshn.io/offered: 'true'
    metadata.appcat.vshn.io/serviceID: garage-garage-objectbucket
    name: garage.objectbuckets.appcat.vshn.io
  name: garage.objectbuckets.appcat.vshn.io
spec:
  compositeTypeRef:
    apiVersion: appcat.vshn.io/v1
    kind: XObjectBucket
  mode: Pipeline
  pipeline:
    - functionRef:
        name: function-appcat-debug-feat-forgejo-ssh
      input:
        apiVersion: v1
        data:
          chartName: vshngaragebucket
          chartRepository: https://charts.appcat.ch/
          chartVersion: 0.0.1
          crossplaneNamespace: syn-crossplane
          providerConfig: minio
          proxyEndpoint: 172.20.0.1:9443
          serviceID: minio-minio-objectbucket
          serviceName: miniobucket
        kind: ConfigMap
        metadata:
          labels:
            name: xfn-config
          name: xfn-config
      step: garagebucket-func
  writeConnectionSecretsToNamespace: syn-crossplane
