apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    metadata.appcat.vshn.io/enabled-services-hash: 3b31c08d86afa0bae819bc4d4d148fb3
  labels:
    appcat-controller: appcat-controller
  name: appcat-controller
  namespace: syn-appcat
spec:
  replicas: 2
  selector:
    matchLabels:
      appcat-controller: appcat-controller
  template:
    metadata:
      annotations:
        kubeconfighash: 275876e34cf609db118f3d84b799a790
      labels:
        appcat-controller: appcat-controller
    spec:
      containers:
        - args:
            - controller
            - --leader-elect
            - --appcat-webhooks=false
            - --provider-webhooks=false
            - --event-forwarding=false
            - --quotas=false
            - --billing=false
            - --crossplane-metrics=true
          env:
            - name: PLANS_NAMESPACE
              value: syn-appcat
            - name: CONTROL_PLANE_KUBECONFIG
              value: /config/config
            - name: CROSSPLANE_LABEL_MAPPING
              value: |
                {
                  "crossplane.io/claim-name": "claim_name",
                  "crossplane.io/claim-namespace": "claim_namespace",
                  "crossplane.io/composite": "instance_name"
                }
            - name: CROSSPLANE_EXTRA_RESOURCES
              value: ''
          image: ghcr.io/vshn/appcat:f33c10dada9306757e6c1a77e2b694993246ab39
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          name: manager
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 200m
              memory: 300Mi
            requests:
              cpu: 100m
              memory: 50Mi
          volumeMounts:
            - mountPath: /etc/webhook/certs
              name: webhook-certs
            - mountPath: /config
              name: kubeconfig
      securityContext:
        runAsNonRoot: true
      serviceAccountName: appcat-controller
      terminationGracePeriodSeconds: 10
      volumes:
        - name: webhook-certs
          secret:
            secretName: webhook-cert
        - name: kubeconfig
          secret:
            secretName: controlclustercredentials
